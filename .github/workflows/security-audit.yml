name: Security Audit

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main]
  pull_request:
    branches: [main, development]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
