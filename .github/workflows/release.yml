name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CARGO_DIST_VERSION: "0.28.0"
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked --version ${{ env.CARGO_DIST_VERSION }}

      - name: Validate formatting
        run: cargo fmt --all -- --check

      - name: Validate lints
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate tests
        run: cargo test --all

      - name: Build release artifacts
        run: cargo dist build --tag ${{ env.RELEASE_TAG }}

      - name: Publish GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo dist host --tag ${{ env.RELEASE_TAG }}
